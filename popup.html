<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Sling Shift Catcher</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        width: 380px;
        padding: 12px;
        box-sizing: border-box;
      }

      h2 {
        margin: 0 0 10px 0;
        font-size: 16px;
      }

      h3 {
        margin: 14px 0 6px 0;
        font-size: 14px;
      }

      label {
        display: block;
        margin-top: 10px;
        font-size: 13px;
        font-weight: 600;
      }

      input[type="text"],
      input[type="number"],
      textarea {
        width: 100%;
        box-sizing: border-box;
        margin-top: 4px;
        padding: 8px;
        font-size: 13px;
      }

      textarea {
        min-height: 72px;
        resize: vertical;
      }

      .small-area {
        min-height: 58px;
      }

      .row {
        display: flex;
        align-items: center;
        gap: 8px;
        margin-top: 10px;
      }

      .row input[type="checkbox"] {
        margin: 0;
      }

      .grid {
        display: grid;
        grid-template-columns: 1fr;
        gap: 8px;
      }

      button {
        margin-top: 12px;
        width: 100%;
        padding: 10px;
        font-size: 14px;
        cursor: pointer;
      }

      .status {
        margin-top: 10px;
        font-size: 12px;
        min-height: 16px;
      }

      .note {
        margin-top: 10px;
        font-size: 12px;
        color: #555;
        line-height: 1.4;
      }

      .section {
        border-top: 1px solid #ddd;
        margin-top: 14px;
        padding-top: 10px;
      }
    </style>
  </head>
  <body>
    <h2>Sling Shift Catcher</h2>

    <div class="row">
      <input id="enabled" type="checkbox" />
      <label for="enabled" style="margin: 0; font-weight: normal"
        >Enabled</label
      >
    </div>

    <div class="row">
      <input id="keepPinnedTab" type="checkbox" />
      <label for="keepPinnedTab" style="margin: 0; font-weight: normal"
        >Keep pinned watcher tab open</label
      >
    </div>

    <div class="row">
      <input id="dryRun" type="checkbox" />
      <label for="dryRun" style="margin: 0; font-weight: normal"
        >Dry run only</label
      >
    </div>

    <label for="targetUrl">Target Sling chat URL</label>
    <input id="targetUrl" type="text" />

    <label for="replyText">Reply text</label>
    <input id="replyText" type="text" />

    <label for="cooldownSec">Cooldown between replies (seconds)</label>
    <input id="cooldownSec" type="number" min="0" />

    <label for="keywords">Keywords / phrases (one per line)</label>
    <textarea id="keywords"></textarea>

    <div class="section">
      <h3>Busy times</h3>

      <div class="row">
        <input id="busyWindowsEnabled" type="checkbox" />
        <label for="busyWindowsEnabled" style="margin: 0; font-weight: normal"
          >Block replies during busy windows</label
        >
      </div>

      <label for="busyWindowsAnyDay"
        >General busy windows (every day, one per line)</label
      >
      <textarea
        id="busyWindowsAnyDay"
        class="small-area"
        placeholder="12-1&#10;5-7"
      ></textarea>

      <div class="grid">
        <div>
          <label for="mondayBusy">Monday</label>
          <textarea
            id="mondayBusy"
            class="small-area"
            placeholder="9-11&#10;2-4"
          ></textarea>
        </div>
        <div>
          <label for="tuesdayBusy">Tuesday</label>
          <textarea id="tuesdayBusy" class="small-area"></textarea>
        </div>
        <div>
          <label for="wednesdayBusy">Wednesday</label>
          <textarea id="wednesdayBusy" class="small-area"></textarea>
        </div>
        <div>
          <label for="thursdayBusy">Thursday</label>
          <textarea id="thursdayBusy" class="small-area"></textarea>
        </div>
        <div>
          <label for="fridayBusy">Friday</label>
          <textarea id="fridayBusy" class="small-area"></textarea>
        </div>
        <div>
          <label for="saturdayBusy">Saturday</label>
          <textarea id="saturdayBusy" class="small-area"></textarea>
        </div>
        <div>
          <label for="sundayBusy">Sunday</label>
          <textarea id="sundayBusy" class="small-area"></textarea>
        </div>
      </div>
    </div>

    <button id="saveBtn">Save settings</button>
    <button id="openWatcherBtn">Open / Focus pinned watcher tab</button>

    <div id="status" class="status"></div>

    <div class="note">
      Busy time format: one range per line, for example <b>9-11</b>,
      <b>4:30-8</b>, or <b>9 am to 4 pm</b>.
    </div>

    <script src="popup.js"></script>
  </body>
</html>
